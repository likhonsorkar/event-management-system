{% extends "template.html" %}
{% block title %}Password Changed - Evently{% endblock %}

{% block content %}
<div class="min-h-[50vh] flex items-center justify-center py-12">
    <div class="w-full max-w-lg bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 rounded-2xl shadow-2xl p-8 text-center">
        <div class="w-16 h-16 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Password Updated</h2>
        <p class="text-gray-500 dark:text-zinc-400 mb-8">
            Your password has been successfully changed. You can now use your new password to log in.
        </p>
        
        <a href="{% url 'profile' %}" class="inline-flex px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-colors shadow-lg shadow-blue-500/25">
            Back to Profile
        </a>
    </div>
</div>
{% endblock %}

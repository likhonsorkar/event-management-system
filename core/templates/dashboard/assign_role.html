{% extends "dashboard/base.html" %}

{% block title %}Assign Role - {{ user.username }}{% endblock %}

{% block dashboard_content %}
<div class="max-w-2xl mx-auto animate-in slide-in-from-bottom-8 duration-500">
    <div class="bg-white dark:bg-zinc-900 rounded-[2.5rem] border border-slate-100 dark:border-zinc-800 p-8 md:p-12 shadow-xl shadow-slate-200/50 dark:shadow-none">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center text-white text-3xl font-black mx-auto mb-6 shadow-xl shadow-blue-500/20">
                {{ user.username|first|upper }}
            </div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Assign New Role</h1>
            <p class="text-slate-500 dark:text-zinc-400 mt-2 font-medium">Updating permissions for <span class="text-slate-900 dark:text-white font-bold">{{ user.username }}</span></p>
        </div>

        <!-- Form -->
        <form method="POST" class="space-y-8">
            {% csrf_token %}
            
            <div class="space-y-4">
                <label class="text-[10px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-[0.2em] px-4">Select Role</label>
                
                <div class="grid grid-cols-1 gap-4">
                    <!-- Organizer Option -->
                    <label class="relative group cursor-pointer">
                        <input type="radio" name="group" value="organizer" class="peer sr-only" {% if user.groups.all.0.name == 'organizer' %}checked{% endif %}>
                        <div class="p-6 bg-slate-50 dark:bg-zinc-800/50 border-2 border-transparent rounded-[2rem] transition-all peer-checked:border-blue-600 peer-checked:bg-white dark:peer-checked:bg-zinc-800 group-hover:bg-slate-100 dark:group-hover:bg-zinc-800">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-600">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                    </div>
                                    <div>
                                        <p class="font-black text-slate-900 dark:text-white uppercase tracking-tight">Organizer</p>
                                        <p class="text-xs text-slate-500 dark:text-zinc-500 font-medium">Can create and manage events</p>
                                    </div>
                                </div>
                                <div class="w-6 h-6 rounded-full border-2 border-slate-200 dark:border-zinc-700 flex items-center justify-center peer-checked:border-blue-600">
                                    <div class="w-3 h-3 bg-blue-600 rounded-full opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                                </div>
                            </div>
                        </div>
                    </label>

                    <!-- Participant Option -->
                    <label class="relative group cursor-pointer">
                        <input type="radio" name="group" value="participant" class="peer sr-only" {% if user.groups.all.0.name == 'participant' or not user.groups.all %}checked{% endif %}>
                        <div class="p-6 bg-slate-50 dark:bg-zinc-800/50 border-2 border-transparent rounded-[2rem] transition-all peer-checked:border-blue-600 peer-checked:bg-white dark:peer-checked:bg-zinc-800 group-hover:bg-slate-100 dark:group-hover:bg-zinc-800">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-emerald-600/10 rounded-2xl flex items-center justify-center text-emerald-600">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                    </div>
                                    <div>
                                        <p class="font-black text-slate-900 dark:text-white uppercase tracking-tight">Participant</p>
                                        <p class="text-xs text-slate-500 dark:text-zinc-500 font-medium">Can discover and join events</p>
                                    </div>
                                </div>
                                <div class="w-6 h-6 rounded-full border-2 border-slate-200 dark:border-zinc-700 flex items-center justify-center peer-checked:border-blue-600">
                                    <div class="w-3 h-3 bg-blue-600 rounded-full opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                                </div>
                            </div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-4 pt-4">
                <a href="{% url 'user_list' %}" class="flex-1 text-center py-4 bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-zinc-400 font-black text-xs uppercase tracking-widest rounded-2xl hover:bg-slate-200 transition-all">Cancel</a>
                <button type="submit" class="flex-[2] py-4 bg-blue-600 text-white font-black text-xs uppercase tracking-widest rounded-2xl shadow-xl shadow-blue-500/20 hover:bg-blue-700 transition-all transform active:scale-95">Update Permissions</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'template.html' %}

{% block title %}Login - Evently{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 p-8 rounded-2xl shadow-xl">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Welcome Back</h2>
            <p class="text-gray-500 dark:text-zinc-400">Sign in to manage your events</p>
        </div>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label for="id_username" class="text-sm font-medium text-gray-700 dark:text-zinc-300">Username</label>
                <div class="relative">
                    <input type="text" name="username" id="id_username" required
                        class="w-full pl-4 pr-4 py-3 bg-gray-50 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-700 rounded-xl text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none"
                        placeholder="Enter your username">
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex items-center justify-between">
                    <label for="id_password" class="text-sm font-medium text-gray-700 dark:text-zinc-300">Password</label>
                    <a href="{% url 'password_reset' %}" class="text-xs text-blue-600 dark:text-blue-400 hover:underline">Forgot password?</a>
                </div>
                <div class="relative">
                    <input type="password" name="password" id="id_password" required
                        class="w-full pl-4 pr-4 py-3 bg-gray-50 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-700 rounded-xl text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-all shadow-lg shadow-blue-500/25">
                Sign In
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-gray-100 dark:border-zinc-700 text-center">
            <p class="text-gray-600 dark:text-zinc-400">
                New to Evently? <a href="{% url 'register' %}" class="text-blue-600 dark:text-blue-400 font-semibold hover:underline">Create an account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
